name: CI/CD Pipeline for POS System

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:

      # Checkout source code
      - name: Checkout Repository
        uses: actions/checkout@v4


      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'


      # Install root dependencies (if package.json exists)
      - name: Install Root Dependencies
        run: npm install


      # Install frontend dependencies
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install


      # Install backend dependencies
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install


      # Run ESLint only if configuration exists
      - name: Lint Backend
        working-directory: ./backend
        run: |
          if [ -f eslint.config.js ] || \
             [ -f .eslintrc.json ] || \
             [ -f .eslintrc.js ] || \
             [ -f .eslintrc.yml ] || \
             [ -f .eslintrc.yaml ]; then

            echo "ESLint configuration found"
            npm run lint

          else

            echo "No ESLint configuration found. Skipping lint."

          fi


      # Run backend tests
      # Allows CI to pass when tests are not created yet
      - name: Test Backend
        working-directory: ./backend
        run: npm test --if-present -- --passWithNoTests


      # Build frontend/application
      - name: Build Application
        run: npm run build:prod



  deploy-to-render:
    name: Deploy to Render
    runs-on: ubuntu-latest

    needs: build-and-test

    # Deploy only after push to main branch
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'


    steps:

      # Deploy Backend
      - name: Trigger Backend Deployment
        run: |
          curl -X POST \
          -H "Accept: application/json" \
          "${{ secrets.RENDER_API_DEPLOY_HOOK }}"

          echo "Backend deployment triggered successfully."


      # Deploy Frontend
      - name: Trigger Frontend Deployment
        run: |
          curl -X POST \
          -H "Accept: application/json" \
          "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"

