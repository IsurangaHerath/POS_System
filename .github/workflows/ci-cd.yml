name: CI/CD Pipeline for POS System

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm install

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      - name: Lint Backend (only if ESLint config exists)
        working-directory: ./backend
        run: |
          if [ -f eslint.config.js ] || [ -f .eslintrc.json ] || [ -f .eslintrc.js ] || [ -f .eslintrc.yml ] || [ -f .eslintrc.yaml ]; then
            echo "ESLint configuration found. Running lint..."
            npm run lint
          else
            echo "No ESLint configuration found. Skipping lint."
          fi

      - name: Test Backend (if available)
        working-directory: ./backend
        run: npm test --if-present

      - name: Build Application
        run: npm run build:prod

  deploy-to-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Backend Deployment
        run: |
          curl -X POST -H "Accept: application/json" "${{ secrets.RENDER_API_DEPLOY_HOOK }}"
          echo "Backend deployment triggered successfully."

      - name: Trigger Frontend Deployment
        run: |
          curl -X POST -H "Accept: application/json" "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"
          echo "Frontend deployment triggered successfully."
